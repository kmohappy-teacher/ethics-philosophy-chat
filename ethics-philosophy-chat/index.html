<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>윤리 철학자 토론(학기말 탐구활동)</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>윤리 철학자 토론(학기말 탐구활동)</h1>
      <p class="sub">
        소크라테스·플라톤·아리스토텔레스 중 1인을 선택하여 주제 토론을 진행하고, 결과를 TXT로 저장합니다.
      </p>
    </header>

    <section class="card">
      <h2>1) 시작 설정</h2>

      <div class="grid">
        <label class="field">
          <span>학번(5자리, 필수)</span>
          <input id="studentId" type="text" inputmode="numeric" maxlength="5" placeholder="예: 30321" />
          <small id="studentIdHelp" class="help">숫자 5자리만 입력하세요.</small>
        </label>

        <label class="field field-span2">
          <span>주제(필수)</span>
          <input id="topic" type="text" placeholder="예: 정의란 무엇인가?" />
        </label>

        <label class="field">
          <span>철학자</span>
          <select id="philosopher">
            <option value="socrates">소크라테스</option>
            <option value="plato">플라톤</option>
            <option value="aristotle">아리스토텔레스</option>
          </select>
        </label>

        <fieldset class="field">
          <legend>토론 모드(시작 시 고정)</legend>
          <label class="radio"><input type="radio" name="mode" value="qa" checked /> 문답형</label>
          <label class="radio"><input type="radio" name="mode" value="debate" /> 찬반형</label>
        </fieldset>
      </div>

      <div class="row">
        <button id="startBtn" class="primary">대화 시작</button>
        <button id="resetBtn" class="ghost" disabled>새로 시작</button>
      </div>

      <p class="notice">
        안내: 개인정보(이름/연락처 등)는 입력하지 마세요. 토론은 학생 발화 20회까지만 가능합니다.
      </p>
    </section>

    <section class="card">
      <h2>2) 토론</h2>

      <div class="row between">
        <div id="sessionInfo" class="sessionInfo">대화를 시작해 주세요.</div>
        <div id="turnInfo" class="turnInfo">턴: 0 / 20</div>
      </div>

      <div id="chatLog" class="chatLog" aria-live="polite"></div>

      <div class="chatInput">
        <textarea id="userInput" rows="3" placeholder="여기에 메시지를 입력하세요." disabled></textarea>
        <div class="row">
          <button id="sendBtn" class="primary" disabled>보내기</button>
          <small id="sendHelp" class="help">철학자 답변은 500자 이내를 목표로 합니다.</small>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>3) 마무리(요약/자기평가) & 다운로드</h2>

      <div class="row">
        <button id="summaryBtn" class="primary" disabled>마무리(요약 생성)</button>
        <button id="downloadBtn" class="ghost" disabled>TXT 다운로드</button>
      </div>

      <label class="field">
        <span>요약(생성 결과)</span>
        <textarea id="summaryText" rows="8" placeholder="요약 생성 버튼을 누르면 자동으로 채워집니다." disabled></textarea>
      </label>

      <div class="grid">
        <label class="field field-span2">
          <span>자기평가 1) 내 최종 입장(3~5줄)</span>
          <textarea id="q1" rows="4" placeholder="내 입장을 정리해 보세요." disabled></textarea>
        </label>

        <label class="field field-span2">
          <span>자기평가 2) 근거 2가지</span>
          <textarea id="q2" rows="4" placeholder="- 근거1) ...&#10;- 근거2) ..." disabled></textarea>
        </label>

        <label class="field field-span2">
          <span>자기평가 3) 가장 설득력 있던 질문/반론 1개와 내 응답</span>
          <textarea id="q3" rows="4" placeholder="- 질문/반론: ...&#10;- 내 응답: ..." disabled></textarea>
        </label>

        <label class="field field-span2">
          <span>자기평가 4) 다음에 더 탐구할 질문 1개</span>
          <textarea id="q4" rows="3" placeholder="다음 탐구 질문을 적어 보세요." disabled></textarea>
        </label>
      </div>

      <p class="notice">
        TXT에는 학번/주제/철학자/모드/대화기록/요약/자기평가가 포함됩니다.
      </p>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
